name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. سحب الكود من الريبو
      - uses: actions/checkout@v4
      
      # 2. تجهيز الجافا (ضرورية جداً للأندرويد)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تجهيز الفلوتر
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          
      # 4. بناء هيكل الفولدرات وإصلاح أخطاء المسارات أوتوماتيكياً
      - name: Create Structure and Fix Paths
        run: |
          mkdir -p mobile_app/android/app
          # وضع ملف الـ JSON السري
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > mobile_app/android/app/google-services.json
          # تعريف مسار الـ SDK
          echo "flutter.sdk=$FLUTTER_ROOT" > mobile_app/android/local.properties
          
          # التعديل السحري: استبدال flutterRoot بـ gradle.flutterSdk في ملف build.gradle
          # ده بيحل مشكلة "Could not get unknown property flutterRoot" نهائياً
          sed -i 's|\$flutterRoot|$gradle.flutterSdk|g' mobile_app/android/app/build.gradle

      # 5. تحميل المكتبات
      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get
          
      # 6. بناء الـ APK الفعلي
      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --release --no-tree-shake-icons
          
      # 7. رفع الملف عشان تقدر تحمله
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
