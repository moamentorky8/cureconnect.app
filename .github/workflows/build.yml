name: Flutter Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: mobile_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.16.0"
          cache: true

      - name: Prepare Flutter
        run: |
          flutter clean
          flutter pub get

      - name: Reconstruct Android
        run: |
          if [ ! -d android ]; then
            flutter create . --platforms=android
          fi

          if [ ! -d android ]; then
            echo "Android project is still missing after flutter create."
            exit 1
          fi

          mkdir -p android/app

          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          fi

          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
