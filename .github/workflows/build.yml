name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          
      - name: Create Structure and Fix Paths
        run: |
          mkdir -p mobile_app/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > mobile_app/android/app/google-services.json
          echo "flutter.sdk=$FLUTTER_ROOT" > mobile_app/android/local.properties
          sed -i 's|\$flutterRoot|$gradle.flutterSdk|g' mobile_app/android/app/build.gradle

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get
          
      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
