name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          
      - name: Force Fix Android Files
        run: |
          mkdir -p mobile_app/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > mobile_app/android/app/google-services.json
          echo "flutter.sdk=$FLUTTER_ROOT" > mobile_app/android/local.properties
          
          # مسح ملف build.gradle اللي عامل مشاكل وكتابة نسخة جديدة سليمة 100%
          cat <<EOF > mobile_app/android/app/build.gradle
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply plugin: 'com.google.gms.google-services'
          apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.moamen.cureconnect"
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.moamen.cureconnect"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get
          
      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
