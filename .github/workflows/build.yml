- name: Prepare Flutter
        run: |
          cd mobile_app
          flutter clean
          flutter pub get
          
      - name: Reconstruct Android (If missing)
        run: |
          cd mobile_app
          flutter create . --platforms android
          mkdir -p android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --debug --no-tree-shake-icons --no-pub
