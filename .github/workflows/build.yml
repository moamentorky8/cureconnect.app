name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          
      - name: Force Build Android
        run: |
          mkdir -p mobile_app/android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > mobile_app/android/app/google-services.json
          
          # مسح أي عك قديم وكتابة ملف build.gradle بيقرأ المسار من البيئة مباشرة
          cat <<EOF > mobile_app/android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply plugin: 'com.google.gms.google-services'
          
          def flutterRoot = System.getenv('FLUTTER_ROOT')
          apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              namespace "com.moamen.cureconnect"
              compileSdkVersion 33
              defaultConfig {
                  applicationId "com.moamen.cureconnect"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get
          
      - name: Build APK
        run: |
          cd mobile_app
          # التعديل الجوهري: بنمرر الـ SDK كـ Argument صريح للأندرويد
          flutter build apk --release --no-tree-shake-icons -Pflutter-root=$FLUTTER_ROOT
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
