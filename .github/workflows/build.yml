name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث لـ v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          
      - name: Add Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > mobile_app/android/app/google-services.json
        
      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get
          
      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --release
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4 # التعديل المهم هنا لـ v4
        with:
          name: release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
